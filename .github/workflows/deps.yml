name: Deps Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ make git \
            pkg-config \
            golang ninja-build \
            libuv1-dev

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: BUILD_TYPE=${{ matrix.build_type }} ./build.sh build

      - name: Run tests
        run: ./build.sh test

      - name: Show dependency status
        run: ./deps.sh status

  linux-aarch64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ make git \
            pkg-config \
            golang ninja-build \
            libuv1-dev

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: ./build.sh build

      - name: Run tests
        run: ./build.sh test

  macos-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install cmake pkg-config go ninja libuv

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: ./build.sh build

      - name: Run tests
        run: ./build.sh test

  windows-x86_64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        shell: bash
        run: |
          choco install ninja nasm go -y
          # Ensure NASM and Go are in PATH for bash
          echo "/c/Program Files/NASM" >> $GITHUB_PATH
          echo "/c/Program Files/Go/bin" >> $GITHUB_PATH

      - name: Fetch dependencies
        shell: bash
        run: ./deps.sh fetch

      - name: Build dependencies
        shell: bash
        run: ./deps.sh build

      - name: Build project
        shell: bash
        run: ./build.sh build

      - name: Run tests
        shell: bash
        run: ./build.sh test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          bash -n deps.sh
          bash -n build.sh
          echo "Shell scripts OK"

      - name: Check CMake syntax
        run: |
          sudo apt-get install -y cmake
          cmake -P CMakeLists.txt 2>&1 || true
