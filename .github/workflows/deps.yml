name: Deps Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ make git \
            pkg-config \
            golang ninja-build \
            libev-dev

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: BUILD_TYPE=${{ matrix.build_type }} ./build.sh build

      - name: Run tests
        run: ./build.sh test

      - name: Show dependency status
        run: ./deps.sh status

  linux-aarch64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ make git \
            pkg-config \
            golang ninja-build \
            libev-dev

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: ./build.sh build

      - name: Run tests
        run: ./build.sh test

  macos-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install cmake pkg-config go ninja libev

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: ./build.sh build

      - name: Run tests
        run: ./build.sh test

  macos-x86_64:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install cmake pkg-config go ninja libev

      - name: Fetch dependencies
        run: ./deps.sh fetch

      - name: Build dependencies
        run: ./deps.sh build

      - name: Build project
        run: ./build.sh build

      - name: Run tests
        run: ./build.sh test

  windows-x86_64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            pkg-config
            cmake
            ninja
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-go
            mingw-w64-x86_64-libev

      - name: Fetch dependencies
        shell: msys2 {0}
        run: ./deps.sh fetch

      - name: Build dependencies
        shell: msys2 {0}
        run: ./deps.sh build

      - name: Build project
        shell: msys2 {0}
        run: ./build.sh build

      - name: Run tests
        shell: msys2 {0}
        run: ./build.sh test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          bash -n deps.sh
          bash -n build.sh
          echo "Shell scripts OK"

      - name: Check CMake syntax
        run: |
          sudo apt-get install -y cmake
          cmake -P CMakeLists.txt 2>&1 || true
