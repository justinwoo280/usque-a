name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ make git \
            pkg-config \
            golang ninja-build libuv1-dev \
            upx-ucl

      - name: Fetch and build dependencies
        run: ./deps.sh all

      - name: Build release binary
        run: ./build.sh release

      - name: UPX compress
        run: |
          BIN="build/src/usque-a-cli.stripped"
          echo "Before: $(du -h "$BIN" | cut -f1)"
          upx --best --lzma "$BIN"
          echo "After:  $(du -h "$BIN" | cut -f1)"

      - name: Package artifact
        run: |
          VER="${{ inputs.version }}"
          NAME="usque-a-${VER}-linux-amd64"
          mkdir -p "${NAME}"
          cp build/src/usque-a-cli.stripped "${NAME}/usque-a-cli"
          tar czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-a-linux-amd64
          path: |
            usque-a-*.tar.gz
            usque-a-*.sha256

  linux-aarch64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ make git \
            pkg-config \
            golang ninja-build libuv1-dev

      - name: Fetch and build dependencies
        run: ./deps.sh all

      - name: Build release binary
        run: ./build.sh release

      - name: Package artifact
        run: |
          VER="${{ inputs.version }}"
          NAME="usque-a-${VER}-linux-arm64"
          mkdir -p "${NAME}"
          cp build/src/usque-a-cli.stripped "${NAME}/usque-a-cli"
          tar czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-a-linux-arm64
          path: |
            usque-a-*.tar.gz
            usque-a-*.sha256

  macos-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake pkg-config go ninja libuv

      - name: Fetch and build dependencies
        run: ./deps.sh all

      - name: Build release binary
        run: ./build.sh release

      - name: Package artifact
        run: |
          VER="${{ inputs.version }}"
          NAME="usque-a-${VER}-darwin-arm64"
          mkdir -p "${NAME}"
          cp build/src/usque-a-cli.stripped "${NAME}/usque-a-cli"
          tar czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-a-darwin-arm64
          path: |
            usque-a-*.tar.gz
            usque-a-*.sha256

  windows-x86_64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          choco install ninja -y

      - name: Fetch and build dependencies
        shell: bash
        run: ./deps.sh all

      - name: Build release binary
        shell: bash
        run: ./build.sh release

      - name: Download wintun.dll
        shell: bash
        run: |
          curl -L -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          7z x wintun.zip -owintun_tmp
          cp wintun_tmp/wintun/bin/amd64/wintun.dll build/src/

      - name: Package artifact
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          NAME="usque-a-${VER}-windows-amd64"
          mkdir -p "${NAME}"
          cp build/src/usque-a-cli.exe "${NAME}/usque-a-cli.exe"
          cp build/src/wintun.dll "${NAME}/wintun.dll"
          7z a "${NAME}.zip" "${NAME}"
          certutil -hashfile "${NAME}.zip" SHA256 > "${NAME}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-a-windows-amd64
          path: |
            usque-a-*.zip
            usque-a-*.sha256

  publish:
    needs: [linux-x86_64, linux-aarch64, macos-arm64, windows-x86_64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: usque-a v${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
